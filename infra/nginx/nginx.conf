server {
    listen 80;
    server_name api.bravvi.tec.br;

    # Limite de tamanho de upload (ex: para upload de arquivos)
    client_max_body_size 10M;

    location / {
        # Redireciona o tráfego HTTP para o container da API (serviço 'web' no docker-compose)
        proxy_pass http://web:8000;
        
        # Repassa os cabeçalhos originais para que a API saiba o IP/Host real do cliente
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Evita problemas de buffering com respostas longas ou streaming
        proxy_buffering off;
    }
}
